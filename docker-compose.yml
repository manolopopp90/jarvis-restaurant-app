version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurant-backend
    user: "node:node"
    ports:
      - "3000:3000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_PATH=/app/data/seeblick.db
    restart: unless-stopped
    networks:
      - restaurant-network

  frontend:
    image: restaurant-app-cors:latest
    container_name: restaurant-frontend
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - API_URL=http://backend:3000
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - restaurant-network

networks:
  restaurant-network:
    driver: bridge

volumes:
  backend-data: